<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Starry Wishlist</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Caveat:wght@500;700&family=Nunito:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#241d14;
    --night:#0b1638;
    --night-soft:#132048;
    --gold:#d4a72c;
    --gold-bright:#f4c430;
    --canvas:#f7ecd6;
    --canvas-dark:#efdfb8;
    --teal:#2f7a8c;
    --white:#fffaf0;
    --shadow: 6px 6px 0 rgba(0,0,0,0.4);
  }
  *{box-sizing:border-box;}
  html,body{ height:100%; }
  body{
    margin:0;
    font-family:'Nunito', sans-serif;
    color:var(--white);
    background-color:var(--night);
    min-height:100vh;
    padding-bottom:70px;
    position:relative;
  }
  h1,h2,h3,.headline{ font-family:'Playfair Display', serif; }
  .brush{ font-family:'Caveat', cursive; }

  /* ---------- Van Gogh "The Starry Night" backdrop ---------- */
  .vg-sky{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    z-index:-1;
    overflow:hidden;
    background-image:
      linear-gradient(rgba(5,10,25,0.32), rgba(5,10,25,0.5)),
      url('https://upload.wikimedia.org/wikipedia/commons/thumb/e/ea/Van_Gogh_-_Starry_Night_-_Google_Art_Project.jpg/1920px-Van_Gogh_-_Starry_Night_-_Google_Art_Project.jpg');
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    animation: vgZoom 60s ease-in-out infinite alternate;
  }
  @keyframes vgZoom{
    0%{ transform:scale(1); }
    100%{ transform:scale(1.07); }
  }

  /* ---------- Header ---------- */
  header{
    text-align:center;
    padding:56px 16px 30px;
    position:relative;
  }
  header h1{
    margin:0;
    font-size:3rem;
    font-weight:800;
    color:var(--gold-bright);
    text-shadow: 0 2px 0 rgba(0,0,0,0.5), 0 0 26px rgba(244,196,48,0.35);
    letter-spacing:0.5px;
  }
  .subtitle{
    margin-top:12px;
    font-size:1.05rem;
    font-family:'Caveat', cursive;
    color:var(--canvas);
    opacity:0.9;
  }
  .live-dot{
    position:absolute;
    top:26px;
    left:6%;
    width:10px;
    height:10px;
    border-radius:50%;
    background:#5a5648;
    border:1.5px solid rgba(247,236,214,0.4);
  }
  .live-dot.on{ background:#5fae5f; }

  /* ---------- Tabs ---------- */
  .tabs{
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
    margin:0 auto 8px;
    padding:0 16px;
  }
  .tab-btn{
    font-family:'Playfair Display', serif;
    font-weight:700;
    font-size:1.05rem;
    padding:10px 26px;
    border:2px solid rgba(247,236,214,0.4);
    border-radius:20px;
    background:rgba(11,22,56,0.4);
    color:var(--canvas);
    cursor:pointer;
    backdrop-filter: blur(2px);
    transition: all 0.15s ease;
  }
  .tab-btn:hover{ border-color:var(--gold-bright); color:var(--gold-bright); }
  .tab-btn.active{
    background:var(--gold);
    border-color:var(--gold);
    color:var(--ink);
  }

  /* ---------- Layout ---------- */
  main{
    max-width:1000px;
    margin:0 auto;
    padding:26px 24px 0;
  }
  .panel{ display:none; }
  .panel.active{ display:block; }

  .add-row{
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    align-items:center;
    background:rgba(11,22,56,0.45);
    border:2px solid rgba(247,236,214,0.3);
    border-radius:14px;
    backdrop-filter: blur(3px);
    padding:16px;
    margin-bottom:30px;
  }
  .add-row input, .add-row select{
    font-family:'Nunito', sans-serif;
    font-size:0.92rem;
    padding:9px 11px;
    border:2px solid var(--gold);
    border-radius:8px;
    background:var(--canvas);
    color:var(--ink);
  }
  .add-row input[type="text"]{ flex:2; min-width:160px; }
  .add-row select{ flex:1; min-width:130px; }
  .add-btn{
    font-family:'Playfair Display', serif;
    font-weight:700;
    background:var(--gold);
    color:var(--ink);
    border:2px solid var(--gold-bright);
    border-radius:8px;
    padding:9px 20px;
    cursor:pointer;
  }
  .add-btn:hover{ background:var(--gold-bright); }
  .add-btn:active{ transform:translate(1px,1px); }
  .add-btn:disabled{ opacity:0.6; cursor:default; }

  /* ---------- Cards ---------- */
  .grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(250px, 1fr));
    gap:26px;
  }
  .card{
    position:relative;
    background:var(--canvas);
    border:4px solid var(--gold);
    box-shadow: 0 0 0 1px var(--ink) inset, var(--shadow);
    border-radius:3px;
    padding:16px 16px 14px;
    color:var(--ink);
    transition: transform 0.18s ease;
  }
  .card:hover{ transform:translateY(-4px); }

  .card.done{ opacity:0.7; }
  .card.done .card-title{ text-decoration:line-through; text-decoration-color:var(--teal); }

  .card-top{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:8px;
    margin-top:4px;
  }
  .card-title{
    font-family:'Playfair Display', serif;
    font-weight:700;
    font-size:1.25rem;
    margin:0 0 6px;
  }
  .card-notes{
    font-size:0.88rem;
    opacity:0.75;
    margin:6px 0 8px;
    font-style:italic;
  }
  .added-by{
    font-size:0.7rem;
    opacity:0.55;
    margin:0 0 8px;
  }
  .stars{ letter-spacing:2px; color:var(--gold); font-size:0.95rem; }

  .badge{
    font-family:'Caveat', cursive;
    font-weight:700;
    font-size:0.95rem;
    padding:3px 12px;
    border:2px solid;
    border-radius:14px;
    display:inline-block;
    white-space:nowrap;
  }
  .badge.want{ color:var(--teal); border-color:var(--teal); }
  .badge.progress{ color:#b9871f; border-color:#b9871f; background:rgba(212,167,44,0.08); }
  .badge.done{ color:#7a7a6a; border-color:#7a7a6a; }

  .card-actions{
    display:flex;
    gap:8px;
    margin-top:12px;
  }
  .icon-btn{
    font-family:'Nunito', sans-serif;
    font-weight:600;
    font-size:0.75rem;
    border:2px solid var(--ink);
    background:var(--white);
    color:var(--ink);
    border-radius:6px;
    cursor:pointer;
    padding:5px 10px;
  }
  .icon-btn:hover{ background:var(--night); color:var(--white); border-color:var(--night); }

  /* ---------- Photo (framed painting) ---------- */
  .photo-wrap{
    position:relative;
    margin:-16px -16px 14px;
    background:#0d0d0d;
    border-bottom:4px solid var(--gold);
    overflow:hidden;
  }
  .photo-wrap img{
    display:block;
    width:100%;
    height:180px;
    object-fit:cover;
    filter:saturate(1.2) contrast(1.06);
  }
  .photo-placeholder{
    height:180px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:8px;
    background:linear-gradient(135deg, #16305f, #0b1638);
    color:#cbd6ea;
    font-family:'Nunito', sans-serif;
    font-size:0.75rem;
    letter-spacing:0.5px;
    text-align:center;
    padding:10px;
  }
  .photo-placeholder .glyph{ font-size:1.6rem; opacity:0.85; }
  .photo-placeholder .dots::after{ content:"..."; animation: blink 1.2s steps(4) infinite; }
  @keyframes blink{ 0%,100%{ opacity:0.2; } 50%{ opacity:1; } }
  .photo-placeholder button{
    font-family:'Nunito', sans-serif;
    font-size:0.68rem;
    text-transform:uppercase;
    border:1px solid #cbd6ea;
    background:transparent;
    color:#cbd6ea;
    padding:4px 9px;
    cursor:pointer;
    margin-top:2px;
    border-radius:4px;
  }
  .photo-placeholder button:hover{ background:#cbd6ea; color:#0b1638; }

  .blurb{
    font-size:0.82rem;
    opacity:0.78;
    line-height:1.4;
    margin:2px 0 10px;
  }
  .blurb a{
    color:var(--teal);
    text-decoration:none;
    font-size:0.72rem;
    white-space:nowrap;
    font-weight:600;
  }
  .blurb a:hover{ text-decoration:underline; }

  .empty-msg{
    text-align:center;
    font-family:'Caveat', cursive;
    font-size:1.3rem;
    color:var(--canvas);
    opacity:0.7;
    padding:50px 0;
  }

  footer{
    text-align:center;
    font-family:'Caveat', cursive;
    font-size:1rem;
    color:var(--canvas);
    opacity:0.6;
    margin-top:50px;
  }

  @media (max-width:480px){
    header h1{ font-size:2.1rem; }
    .tab-btn{ flex:1; padding:10px 12px; font-size:0.95rem; }
  }
</style>
</head>
<body>

<div class="vg-sky" aria-hidden="true"></div>

<header>
  <span class="live-dot" id="live-dot" title=""></span>
  <h1>My Starry Wishlist</h1>
  <p class="subtitle">books to read &middot; films to watch &middot; hobbies to try &mdash; shared live with everyone who visits</p>
</header>

<div class="tabs">
  <button class="tab-btn active" data-cat="books" onclick="switchTab('books')">Books</button>
  <button class="tab-btn" data-cat="films" onclick="switchTab('films')">Films</button>
  <button class="tab-btn" data-cat="hobbies" onclick="switchTab('hobbies')">Hobbies</button>
</div>

<main>

  <!-- BOOKS -->
  <section class="panel active" id="panel-books">
    <div class="add-row">
      <input type="text" id="books-title" placeholder="Book title...">
      <input type="text" id="books-notes" class="notes" placeholder="Author / notes (optional)">
      <select id="books-status">
        <option value="want">Want to read</option>
        <option value="progress">Reading now</option>
        <option value="done">Finished</option>
      </select>
      <select id="books-priority">
        <option value="1">&#9733;</option>
        <option value="2">&#9733;&#9733;</option>
        <option value="3" selected>&#9733;&#9733;&#9733;</option>
        <option value="4">&#9733;&#9733;&#9733;&#9733;</option>
        <option value="5">&#9733;&#9733;&#9733;&#9733;&#9733;</option>
      </select>
      <button class="add-btn" onclick="addItem('books')">Add Book</button>
    </div>
    <div class="grid" id="grid-books"></div>
  </section>

  <!-- FILMS -->
  <section class="panel" id="panel-films">
    <div class="add-row">
      <input type="text" id="films-title" placeholder="Film / show title...">
      <input type="text" id="films-notes" class="notes" placeholder="Notes (optional)">
      <select id="films-status">
        <option value="want">Want to watch</option>
        <option value="progress">Watching now</option>
        <option value="done">Watched</option>
      </select>
      <select id="films-priority">
        <option value="1">&#9733;</option>
        <option value="2">&#9733;&#9733;</option>
        <option value="3" selected>&#9733;&#9733;&#9733;</option>
        <option value="4">&#9733;&#9733;&#9733;&#9733;</option>
        <option value="5">&#9733;&#9733;&#9733;&#9733;&#9733;</option>
      </select>
      <button class="add-btn" onclick="addItem('films')">Add Film</button>
    </div>
    <div class="grid" id="grid-films"></div>
  </section>

  <!-- HOBBIES -->
  <section class="panel" id="panel-hobbies">
    <div class="add-row">
      <input type="text" id="hobbies-title" placeholder="Hobby / skill to try...">
      <input type="text" id="hobbies-notes" class="notes" placeholder="Notes (optional)">
      <select id="hobbies-status">
        <option value="want">Want to try</option>
        <option value="progress">Learning now</option>
        <option value="done">Mastered</option>
      </select>
      <select id="hobbies-priority">
        <option value="1">&#9733;</option>
        <option value="2">&#9733;&#9733;</option>
        <option value="3" selected>&#9733;&#9733;&#9733;</option>
        <option value="4">&#9733;&#9733;&#9733;&#9733;</option>
        <option value="5">&#9733;&#9733;&#9733;&#9733;&#9733;</option>
      </select>
      <button class="add-btn" onclick="addItem('hobbies')">Add Hobby</button>
    </div>
    <div class="grid" id="grid-hobbies"></div>
  </section>

</main>

<footer>painted with a little wonder, for your own little wishlist universe<br><span style="font-family:'Nunito',sans-serif; font-size:0.65rem; opacity:0.6;">background: Vincent van Gogh, <em>The Starry Night</em> (1889), public domain, via Wikimedia Commons</span></footer>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-database-compat.js"></script>
<script>
/* ---------- Firebase (shared live database) ---------- */
const firebaseConfig = {
  apiKey: "AIzaSyCbSazqocXiTmUTphi8WuZfH1UEAjt_P3g",
  authDomain: "wishlist-efe39.firebaseapp.com",
  databaseURL: "https://wishlist-efe39-default-rtdb.firebaseio.com",
  projectId: "wishlist-efe39",
  storageBucket: "wishlist-efe39.firebasestorage.app",
  messagingSenderId: "430269543877",
  appId: "1:430269543877:web:992037fb709810ff3887ac"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const CATS = ['books','films','hobbies'];
const STATUS_LABELS = { want:'Want', progress:'In Progress', done:'Completed' };

let data = { books:[], films:[], hobbies:[] };

db.ref('.info/connected').on('value', snap => {
  const dot = document.getElementById('live-dot');
  if(dot) dot.classList.toggle('on', snap.val() === true);
});

CATS.forEach(cat=>{
  db.ref(cat).on('value', snapshot=>{
    const val = snapshot.val() || {};
    data[cat] = Object.keys(val).map(id=>Object.assign({id}, val[id]));
    data[cat].sort((a,b)=>(b.createdAt||0)-(a.createdAt||0));
    render(cat);
  });
});

function switchTab(cat){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.toggle('active', b.dataset.cat===cat));
  document.querySelectorAll('.panel').forEach(p=>p.classList.toggle('active', p.id==='panel-'+cat));
}

function addItem(cat){
  const titleEl = document.getElementById(cat+'-title');
  const notesEl = document.getElementById(cat+'-notes');
  const statusEl = document.getElementById(cat+'-status');
  const priorityEl = document.getElementById(cat+'-priority');
  const title = titleEl.value.trim();
  if(!title){ titleEl.focus(); return; }
  const newItem = {
    title,
    notes: notesEl.value.trim(),
    status: statusEl.value,
    priority: parseInt(priorityEl.value,10),
    createdAt: Date.now()
  };
  const newRef = db.ref(cat).push();
  titleEl.value=''; notesEl.value=''; statusEl.value='want'; priorityEl.value='3';
  newRef.set(newItem).then(()=>{
    fetchInfoForItem(cat, newRef.key);
  });
}

/* ---------- Open-source lookups: Open Library (books) + Wikipedia (films/hobbies) ---------- */

async function fetchBookInfo(title){
  const res = await fetch('https://openlibrary.org/search.json?title=' + encodeURIComponent(title) + '&limit=1');
  if(!res.ok) return null;
  const json = await res.json();
  const doc = json.docs && json.docs[0];
  if(!doc) return null;
  const image = doc.cover_i ? ('https://covers.openlibrary.org/b/id/' + doc.cover_i + '-L.jpg') : null;
  const author = doc.author_name ? doc.author_name[0] : '';
  const year = doc.first_publish_year || '';
  const blurb = [author, year].filter(Boolean).join(' · ') || 'record located, no further details on file.';
  const sourceUrl = doc.key ? ('https://openlibrary.org' + doc.key) : null;
  if(!image && !sourceUrl) return null;
  return { image, blurb, sourceUrl, sourceLabel:'Open Library' };
}

async function fetchWikiInfo(title, isFilm){
  const candidates = isFilm ? [title + ' (film)', title] : [title];
  for(const t of candidates){
    try{
      const res = await fetch('https://en.wikipedia.org/api/rest_v1/page/summary/' + encodeURIComponent(t));
      if(!res.ok) continue;
      const json = await res.json();
      if(json.type === 'disambiguation') continue;
      const image = (json.originalimage && json.originalimage.source) || (json.thumbnail && json.thumbnail.source) || null;
      let blurb = json.extract || '';
      if(blurb.length > 150) blurb = blurb.slice(0,150).trim() + '…';
      const sourceUrl = json.content_urls && json.content_urls.desktop && json.content_urls.desktop.page;
      if(!image && !blurb) continue;
      return { image, blurb, sourceUrl, sourceLabel:'Wikipedia' };
    }catch(e){ continue; }
  }
  return null;
}

async function fetchInfoForItem(cat, id){
  await db.ref(`${cat}/${id}/fetchStatus`).set('loading');
  let result = null;
  try{
    const item = data[cat].find(i=>i.id===id);
    const title = item ? item.title : null;
    if(!title) return;
    if(cat === 'books') result = await fetchBookInfo(title);
    else result = await fetchWikiInfo(title, cat === 'films');
  }catch(e){ result = null; }
  if(result){
    await db.ref(`${cat}/${id}`).update({
      image: result.image || null,
      blurb: result.blurb || null,
      sourceUrl: result.sourceUrl || null,
      sourceLabel: result.sourceLabel || null,
      fetchStatus: 'done'
    });
  } else {
    await db.ref(`${cat}/${id}/fetchStatus`).set('error');
  }
}

function cycleStatus(cat, id){
  const order = ['want','progress','done'];
  const item = data[cat].find(i=>i.id===id);
  if(!item) return;
  const idx = order.indexOf(item.status);
  const next = order[(idx+1)%order.length];
  db.ref(`${cat}/${id}/status`).set(next);
}

function removeItem(cat, id){
  db.ref(`${cat}/${id}`).remove();
}

function photoPlaceholderHtml(cat, id, state){
  if(state === 'loading'){
    return `<div class="photo-placeholder"><span class="glyph">&#127912;</span><div>painting in progress<span class="dots"></span></div></div>`;
  }
  return `<div class="photo-placeholder"><span class="glyph">&#128269;</span><div>no image found</div><button onclick="fetchInfoForItem('${cat}','${id}')">Retry</button></div>`;
}

function renderPhoto(cat, item){
  if(item.fetchStatus === 'loading') return photoPlaceholderHtml(cat, item.id, 'loading');
  if(item.image){
    return `<img src="${item.image}" alt="${escapeHtml(item.title)}" loading="lazy" onerror="handleImgError(this,'${cat}','${item.id}')">`;
  }
  return photoPlaceholderHtml(cat, item.id, 'error');
}

function handleImgError(imgEl, cat, id){
  const wrap = imgEl.parentElement;
  if(wrap) wrap.innerHTML = photoPlaceholderHtml(cat, id, 'error');
}

function renderBlurb(item){
  if(item.fetchStatus === 'loading') return `<p class="blurb">looking it up…</p>`;
  if(item.blurb){
    const link = item.sourceUrl ? ` <a href="${item.sourceUrl}" target="_blank" rel="noopener">[${item.sourceLabel}]</a>` : '';
    return `<p class="blurb">${escapeHtml(item.blurb)}${link}</p>`;
  }
  return '';
}

function render(cat){
  const grid = document.getElementById('grid-'+cat);
  const items = data[cat];
  if(!items.length){
    grid.innerHTML = '<div class="empty-msg">nothing here yet — add your first one above!</div>';
    return;
  }
  grid.innerHTML = items.map(item=>{
    const stars = '&#9733;'.repeat(item.priority) + '&#9734;'.repeat(5-item.priority);
    const label = STATUS_LABELS[item.status] || 'Want';
    const doneClass = item.status==='done' ? ' done' : '';
    return `
      <div class="card${doneClass}">
        <div class="photo-wrap">${renderPhoto(cat, item)}</div>
        <div class="card-top">
          <h3 class="card-title">${escapeHtml(item.title)}</h3>
          <span class="badge ${item.status}">${label}</span>
        </div>
        ${item.notes ? `<p class="card-notes">${escapeHtml(item.notes)}</p>` : ''}
        ${renderBlurb(item)}
        <div class="stars">${stars}</div>
        <div class="card-actions">
          <button class="icon-btn" onclick="cycleStatus('${cat}','${item.id}')">Update Status</button>
          <button class="icon-btn" onclick="removeItem('${cat}','${item.id}')">Remove</button>
        </div>
      </div>`;
  }).join('');
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

CATS.forEach(render);
</script>

</body>
</html>
